##########################################################################################
### LOOK AND FEEL ###
##########################################################################################

# Referencias:
# https://wiki.hypr.land/Configuring/Variables/
# https://wiki.hypr.land/Configuring/Variables/#general

general {
    gaps_in = 5
    gaps_out = 6
    border_size = 1
 
    # Información sobre colores:
    # https://wiki.hypr.land/Configuring/Variables/#variable-types
    col.active_border = rgba(00000000)
    col.inactive_border = rgba(595959aa)

    # Permite redimensionar arrastrando bordes o huecos
    resize_on_border = false

    # Revisa antes de activar: https://wiki.hypr.land/Configuring/Tearing/
    allow_tearing = false

    layout = dwindle
}

##########################################################################################
### DECORATION ###
##########################################################################################

# https://wiki.hypr.land/Configuring/Variables/#decoration

decoration {
    rounding = 0
    rounding_power = 2

    # Opacidad
    active_opacity = 1
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 5
        passes = 2
        vibrancy = 0.1696
    }
}

##########################################################################################
### ANIMATIONS ###
##########################################################################################

animations {
    enabled = yes

    # Curvas
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1
    bezier = overshoot, 0.05, 0.9, 0.1, 1.1

    # Animaciones
    animation = global, 1, 10, default
    animation = border, 1, 5.3, easeOutQuint
    animation = windows, 1, 4.8, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.5, linear, popin 87%
    animation = fadeIn, 1, 1.7, almostLinear
    animation = fadeOut, 1, 1.4, almostLinear
    animation = fade, 1, 3.0, quick
    animation = layers, 1, 3.8, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.7, almostLinear
    animation = fadeLayersOut, 1, 1.3, almostLinear

    # Animación de cambio de escritorio (slide horizontal)
    animation = workspaces, 1, 5, easeOutQuint, slide
}


# https://wiki.hypr.land/Configuring/Variables/#animations
###########################################################################################
### LAYOUT RULES ###
##########################################################################################

# https://wiki.hypr.land/Configuring/Workspace-Rules/

# "Smart gaps" / "No gaps when only one window"
# Descomenta si deseas usar esa función.

# workspace = w[tv1], gapsout:0, gapsin0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

##########################################################################################
### DWINDLE & MASTER LAYOUT ###
##########################################################################################

# https://wiki.hypr.land/Configuring/Dwindle-Layout/

dwindle {
    pseudotile = true        # Master switch para pseudotiling (mainMod + P)
    preserve_split = true    # Recomendado
}

# https://wiki.hypr.land/Configuring/Master-Layout/
master {
    new_status = master
}

##########################################################################################
### MISC #############################################################################################

# https://wiki.hypr.land/Configuring/Variables/#misc

misc {
    force_default_wallpaper = 0   # 0 o 1 para desactivar fondo por defecto
    disable_hyprland_logo = true

  # true = sin logo ni fondo anime
}
